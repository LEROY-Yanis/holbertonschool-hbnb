<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details - HBNB</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo-link">
                    <img src="logo.png" alt="HBNB Logo" class="logo">
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html" id="login-link" class="login-button">Login</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="place-details-section">
            <div class="section-container">
                <a href="index.html" class="back-link">&larr; Back to Places</a>

                <div id="place-details" class="place-details">
                    <p>Loading place details...</p>
                </div>

                <div id="reviews-section" class="reviews-section">
                    <h2>Reviews</h2>
                    <div id="reviews-list" class="reviews-list">
                        <p>No reviews yet.</p>
                    </div>
                </div>

                <div id="add-review" class="add-review" style="display: none;">
                    <h2>Add a Review</h2>
                    <form id="review-form" class="form">
                        <div class="form-group">
                            <label for="rating">Rating (1-5)</label>
                            <select id="rating" name="rating" required>
                                <option value="">Select rating</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="comment">Comment</label>
                            <textarea id="comment" name="comment" required placeholder="Share your experience..."
                                rows="4"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Submit Review</button>
                    </form>
                    <div id="review-message" class="message" style="display: none;"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
