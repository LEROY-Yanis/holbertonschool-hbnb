<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Places - HBNB</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo-link">
                    <img src="logo.png" alt="HBNB Logo" class="logo">
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html" id="login-link" class="login-button">Login</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="places-section">
            <div class="section-container">
                <h1>Discover Amazing Places</h1>

                <div class="filter-container">
                    <label for="price-filter">Filter by Price (per night):</label>
                    <select id="price-filter">
                        <option value="">All</option>
                        <option value="10">Up to $10</option>
                        <option value="50">Up to $50</option>
                        <option value="100">Up to $100</option>
                    </select>
                </div>

                <div id="places-list" class="places-list">
                    <p>Loading places...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
